<div class="bg-overlay"></div>

<!-- STATUS PANEL (shows on screen) -->

<script type="module">
    // Simple on‑screen logger for phone
    function setStatus(msg) {
        const el = document.getElementById('debugStatus');
        if(el) el.innerText = msg;
    }
    setStatus('🔵 Step 1: Script started');

    // Override alert to also show on screen
    const originalAlert = window.customAlert || alert;
    window.alert = function(msg) {
        setStatus('⚠️ Alert: ' + msg);
        originalAlert(msg);
    };

    // Global error handler
    window.onerror = function(msg, url, line) {
        setStatus('❌ Error: ' + msg + ' (line ' + line + ')');
    };
    window.addEventListener('unhandledrejection', event => {
        setStatus('❌ Promise error: ' + (event.reason?.message || event.reason));
    });

    try {
        setStatus('🔵 Step 2: Importing Firebase...');
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, updateProfile, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, updateDoc, collection, addDoc, query, orderBy, onSnapshot, writeBatch, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
        
        setStatus('🔵 Step 3: Firebase imports OK');
        
        const firebaseConfig = {
            apiKey: "AIzaSyCWliI60g90f-Ed4ydFBPbz027fo7N29tI",
            authDomain: "ceezy-website.firebaseapp.com",
            projectId: "ceezy-website",
            storageBucket: "ceezy-website.appspot.com",
            messagingSenderId: "59858219268",
            appId: "1:59858219268:web:placeholder"
        };
        
        setStatus('🔵 Step 4: Initializing Firebase...');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const googleProvider = new GoogleAuthProvider();
        
        setStatus('🟢 Step 5: Firebase ready');
        
        // ===== SIMPLIFIED VERSION: ONLY SHOW LOGIN SCREEN =====
        // We'll strip down to minimal functionality to see if basic UI works
        
        // Show login view immediately (skip localStorage check for now)
        document.getElementById('loginView').style.display = 'flex';
        document.getElementById('signupView').style.display = 'none';
        document.getElementById('mainApp').style.display = 'none';
        
        setStatus('✅ Firebase loaded! Login screen should be visible.');
        
        // Minimal login test
        window.testLogin = async () => {
            const email = prompt("Enter test email (must exist)");
            const pwd = prompt("Password");
            try {
                await signInWithEmailAndPassword(auth, email, pwd);
                setStatus('✅ Login success!');
                // Show main app
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                // Initialize a basic user object
                window.currentUser = { uid: auth.currentUser.uid, name: auth.currentUser.displayName || 'User' };
            } catch(e) {
                setStatus('❌ Login failed: ' + e.message);
            }
        };
        
        // Attach quick test buttons (optional)
        const btn = document.createElement('button');
        btn.textContent = 'Quick Test Login';
        btn.style.position = 'fixed'; btn.style.top = '60px'; btn.style.right = '10px';
        btn.style.zIndex = '99999'; btn.style.padding = '10px';
        btn.onclick = window.testLogin;
        document.body.appendChild(btn);
        
        // Also add a sign-up test (if needed)
        
    } catch(e) {
        setStatus('💥 FATAL ERROR: ' + e.message);
    }
</script>
