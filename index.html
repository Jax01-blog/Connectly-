<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNECTLY – Connection Test</title>
    <style>
        body { margin: 0; padding: 20px; background: #111; color: white; font-family: sans-serif; }
        #status { background: #222; border-radius: 16px; padding: 20px; margin: 20px; border: 2px solid #444; white-space: pre-wrap; word-break: break-word; }
        .banner { background: #0f0; color: #000; padding: 15px; text-align: center; font-weight: bold; font-size: 1.5rem; }
        button { padding: 16px; margin: 10px; font-size: 1.2rem; border-radius: 40px; border: none; background: #3b82f6; color: white; }
    </style>
</head>
<body>
    <div class="banner">✅ PAGE LOADED – HTML IS WORKING</div>
    <div id="status">⏳ Waiting for JavaScript...</div>
    <button id="testFirebaseBtn">🔌 Test Firebase Connection</button>
    <button id="loadFullAppBtn" style="display:none;">🚀 Load Full App</button>

    <script type="module">
        // Get status display element
        const statusEl = document.getElementById('status');
        function log(msg) {
            console.log(msg);
            statusEl.innerText += '\n' + msg;
        }
        function clearLog() { statusEl.innerText = ''; }
        
        log('📜 Script started (module)');
        
        // Try to import Firebase
        try {
            log('📦 Importing Firebase modules...');
            const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
            const { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
            const { getFirestore, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
            
            log('✅ Firebase modules imported');
            
            const firebaseConfig = {
                apiKey: "AIzaSyCWliI60g90f-Ed4ydFBPbz027fo7N29tI",
                authDomain: "ceezy-website.firebaseapp.com",
                projectId: "ceezy-website",
                storageBucket: "ceezy-website.appspot.com",
                messagingSenderId: "59858219268",
                appId: "1:59858219268:web:placeholder"
            };
            
            log('🔥 Initializing Firebase...');
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            
            log('✅ Firebase initialized successfully!');
            
            // Make Firebase available globally for testing
            window.firebaseReady = true;
            window.auth = auth;
            window.db = db;
            
            document.getElementById('testFirebaseBtn').addEventListener('click', async () => {
                clearLog();
                log('🔍 Testing Firebase Auth...');
                try {
                    // Try anonymous sign-in or just check if auth works
                    const provider = new GoogleAuthProvider();
                    // We'll just test if we can reach Firebase by checking current user
                    const user = auth.currentUser;
                    if (user) {
                        log(`✅ Already signed in as ${user.email || user.uid}`);
                    } else {
                        log('ℹ️ No user signed in. You can try Google Sign-In:');
                        // Add a sign-in button dynamically
                        const btn = document.createElement('button');
                        btn.textContent = 'Sign in with Google';
                        btn.onclick = async () => {
                            try {
                                const result = await signInWithPopup(auth, new GoogleAuthProvider());
                                log(`✅ Signed in as ${result.user.email}`);
                                // Check Firestore
                                const userDoc = await getDoc(doc(db, 'users', result.user.uid));
                                if (userDoc.exists()) {
                                    log('✅ Firestore user document exists');
                                } else {
                                    log('ℹ️ Firestore user document not found');
                                }
                            } catch(e) {
                                log('❌ Google Sign-In error: ' + e.message);
                            }
                        };
                        statusEl.parentNode.insertBefore(btn, statusEl.nextSibling);
                    }
                    
                    // Also test Firestore read
                    try {
                        const testDoc = await getDoc(doc(db, 'users', 'test'));
                        log('✅ Firestore read test OK (doc exists: ' + testDoc.exists() + ')');
                    } catch(e) {
                        log('❌ Firestore read error: ' + e.message);
                    }
                    
                } catch(e) {
                    log('❌ Firebase test error: ' + e.message);
                }
            });
            
            document.getElementById('loadFullAppBtn').style.display = 'inline-block';
            document.getElementById('loadFullAppBtn').addEventListener('click', () => {
                log('➡️ Attempting to load full app...');
                // Redirect to full app (you could also dynamically load it)
                // For now, we just indicate readiness
                log('✅ Ready to load full app. (Replace this with actual app)');
                // If you want, you can load the real app by removing this debug page and injecting the real app.
            });
            
            log('🎉 All systems nominal. You can now test Firebase or load the full app.');
            
        } catch(e) {
            log('💥 FATAL ERROR during import/init: ' + e.message);
            console.error(e);
        }
        
        // Fallback in case module fails early
        window.onerror = (msg) => { log('❌ Global error: ' + msg); };
    </script>
    <noscript>
        <div style="color:red;">JavaScript is disabled or failed to load.</div>
    </noscript>
</body>
</html>
